name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run pre-commit
        run: uv run pre-commit run --all-files
  tests-core:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run core unit tests
        run: uv run pytest -q -m core test
  tests-integration:
    runs-on: ubuntu-latest
    needs: tests-core
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run offline integration regressions
        run: uv run pytest -q -m integration test
