name: PR Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Verify lockfile
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --group dev --extra pyserini
      - name: Run ordered quality gate
        run: uv run ragnarok-quality-gate
