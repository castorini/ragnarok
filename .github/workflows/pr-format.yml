name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run pre-commit
        run: uv run pre-commit run --all-files
      - name: Run unit tests
        run: uv run python -m unittest discover -s test
